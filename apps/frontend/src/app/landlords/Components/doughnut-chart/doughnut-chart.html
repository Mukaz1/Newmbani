<div class="w-full flex flex-col lg:flex-row gap-4  items-center lg:items-stretch">
    <!-- Chart container: fixed width for large screens, keep centered -->
    <div class="flex justify-center items-center w-full max-w-[280px]  lg:max-w-[320px]">
        <div #chartRef class="w-full h-[200px] md:h-[280px] lg:h-[300px] xl:h-[320px]"></div>
    </div>

    <!-- Stats list: fills available space, aligns content nicely -->
    <div class="flex-1 flex flex-col justify-center w-full">
        @for (item of listingBookingStats(); track item) {
        <div class="flex justify-between items-center gap-4 mb-2 last:mb-0">
            <p class="text-sm font-medium truncate flex-1 min-w-0">{{ item.title }}</p>
            <p class="text-sm font-medium flex-shrink-0">{{ item.count }}</p>
        </div>
        }
    </div>
</div>
