<div class="p-5 bg-white rounded-md w-full min-w-[460px] ">
  <p class="font-bold text-lg">Upload {{document ? document.document.name :'Document'}} </p>
  <div class="py-3 ">
    <app-file-uploader (filesSelected)="fileSelected($event)" [multiple]="false" [fileTypes]="[fileMimeGroups.PDF]" />
  </div>
  <div class="flex justify-end gap-2">
    <button (click)="closeModal()" class="px-3 py-1 rounded-full bg-gray-300">Close</button>
    <app-button [disabled]="isFileUploading()" [isLoading]="isFileUploading()" label="Upload"  (buttonClicked)="uploadFile()" />
  </div>
</div>
