<div class="flex h-screen bg-primary-900 p-2">
  <!-- Sidebar: sticks to the left, vertical full height -->
  <div class="hidden md:flex flex-col h-full rounded-xl mr-4">
    <div class="flex-1 overflow-y-auto">
      <app-sidebar />
    </div>
  </div>

  <!-- Sidebar overlay for mobile -->
  @if (isMobileSidebarOpen()) {
  <div class="fixed inset-0 z-50 flex md:hidden left-3 top-3 !bottom-3 max-h-screen">
    <div class="fixed inset-0 bg-black bg-opacity-50" tabindex="0" (click)="closeMobileSidebar()"
      (keydown)="closeMobileSidebar()" aria-label="Close sidebar overlay" role="button"></div>
    <div class="relative w-56 bg-transparent h-full shadow-lg z-50 rounded-xl">
      <button class="absolute top-2 right-0 p-2 rounded" (click)="closeMobileSidebar()">
        <i class="bi bi-x-lg text-xl text-white"></i>
      </button>
      <div class="h-full overflow-y-auto">
        <app-sidebar />
      </div>
    </div>
  </div>
  }

  <!-- Content Column: vertical flex of header + main -->
  <div class="flex flex-col flex-1 min-w-0 px-2">
    <header class="sticky top-0 z-40 w-full">
      <app-header (sidebarOpen)="onSidebarOpen()"></app-header>
    </header>
    <main class="flex-1 px-4 overflow-x-hidden overflow-y-auto rounded-xl bg-white">
      <router-outlet />
    </main>
  </div>
</div>
