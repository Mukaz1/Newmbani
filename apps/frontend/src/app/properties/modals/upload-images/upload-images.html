<div
  class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-50 p-4 animate-fadeIn items-end justify-end">
  <div
    class="relative bg-white  w-full rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col md:w-2/3 w-full min-w-96 h-full rounded-t-2xl">
    <!-- Header -->
    <div
      class="bg-linear-to-r from-primary to-secondary-700 text-white px-4 md:px-8 py-6  sticky top-0 z-10 flex items-center justify-between">
      <h2 class="text-2xl md:text-3xl font-bold tracking-tight">Upload {{imageCategory()?.name }} Images</h2>
      <button class="modal-close" (click)="closeModal()">
        <i class="bi bi-x-lg text-white text-lg"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="flex-1 md:px-8 px-4 py-6 space-y-6 overflow-y-auto space-y-6">
      <div>
        <app-file-uploader [multiple]="true" (filesSelected)="onFilesSelected($event)"
          [fileTypes]="[fileMimeGroups.Images]" />
      </div>

      <div class="pt-5 flex justify-end">
        <app-button label="Upload" [disabled]="selectedFiles.length === 0" [isLoading]="isLoading()"
          (buttonClicked)="upload()" [showIcon]="true" icon="bi bi-cloud-arrow-up" />
      </div>
    </div>

    <!-- Footer -->
    <div
      class="bg-gray-50  px-8 py-4 text-center  text-xs text-gray-500  border-t border-gray-200 sticky bottom-0 z-10 ">
      &copy; {{ currentYear }} Newmbani
    </div>
  </div>
</div>
