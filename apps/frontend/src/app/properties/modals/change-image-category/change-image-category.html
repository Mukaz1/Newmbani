<div
    class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-50 p-4 animate-fadeIn flex items-center justify-center">
    <div class="relative bg-white  w-full rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col w-full max-w-lg rounded-2xl bg-white  shadow-xl relative"
        style="min-width: 24rem;">
        <!-- Header -->
        <div
            class="bg-linear-to-r from-primary to-secondary-700 text-white px-4 md:px-8 py-6  sticky top-0 z-10 flex justify-between items-center border-b border-gray-200 p-4">
            <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-lg font-bold text-white">Change image Category
            </h2>
            <button
                class="absolute top-5 right-6 w-8 h-8 flex items-center justify-center  rounded-full hover:bg-white/20 transition-colors"
                (click)="closeModal()" aria-label="Close modal">
                <i class="bi bi-x-lg text-gray-800 dark:text-white text-lg"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 md:px-8 px-4 py-6 space-y-6 overflow-y-auto">
            <form [formGroup]="propertyImageForm" (submit)="onSubmit()" class="space-y-6">
                <div class="flex flex-col gap-4">
                    <div>
                        <p>{{propertyName()}}</p>
                    </div>
                    <img [src]="propertyImage()?.link" [alt]="propertyName()"
                        class="w-full h-64 object-cover rounded-xl">
                </div>
                <div class="grid grid-cols-1 gap-6">

                    <div>
                        <label for="propertyImageCategoryId" class="block text-sm font-medium text-gray-700 ">
                            Image Category
                        </label>
                        <select id="propertyImageCategoryId" formControlName="propertyImageCategoryId"
                            class="bg-gray-50/80  border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary mt-1"
                            required>
                            @for (image of imageCategories(); track image) {
                            <option value="{{image._id}}"> {{image.name }}</option>
                            }
                        </select>
                    </div>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div
            class="bg-gray-50  px-8 py-4 text-center  text-xs text-gray-500  border-t border-gray-200 sticky bottom-0 z-10 flex justify-end gap-3 p-4">
            <app-button (buttonClicked)="closeModal()" [label]="'Cancel'"
                styles="!bg-gray-200 !hover:bg-gray-400 !text-gray-700 "></app-button>
            <app-button [label]="'Submit'" (click)="onSubmit()" [disabled]="isLoading() || propertyImageForm.invalid"
                [isLoading]="isLoading()"></app-button>
        </div>
    </div>
</div>
