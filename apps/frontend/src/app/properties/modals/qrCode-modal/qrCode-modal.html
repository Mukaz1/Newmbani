<div class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-40 p-4 animate-fadeIn">

    <div
        class="relative bg-white w-full md:w-1/3  h-full md:h-auto md:max-h-[90vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col">

        <!-- Header -->
        <div
            class="bg-linear-to-r from-primary to-secondary-700 text-white px-4 md:px-8 py-6 sticky top-0 z-10 flex items-center justify-between">

            <h2 class="text-xl md:text-2xl font-bold tracking-tight">
                Property QR Code
            </h2>

            <button class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors"
                (click)="close()">
                <i class="bi bi-x-lg text-white text-lg"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 px-4 md:px-8 py-8 flex flex-col items-center justify-center">

            <!-- QR Container -->
            <div class="relative w-64 h-64 flex items-center justify-center">

                <!-- Skeleton / QR Frame -->
                <div
                    class="w-full h-full bg-white rounded-2xl border border-gray-200 flex items-center justify-center overflow-hidden">

                    <!-- Spinner overlay while generating -->
                    @if (isLoading()) {
                    <div class="absolute inset-0 flex items-center justify-center bg-white/70 backdrop-blur-sm z-10">
                        <div class="flex flex-col items-center gap-3">
                            <div
                                class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin">
                            </div>
                            <p class="text-xs text-gray-500">Generating QR code...</p>
                        </div>
                    </div>
                    }

                    <!-- QR Image -->
                    @if (qrCode()) {
                    <img [src]="qrCode()" class="w-full h-full object-contain p-4 transition-opacity duration-500" />
                    }

                    <!-- Placeholder (before generation starts) -->
                    @if (!qrCode() && !isLoading()) {
                    <div class="text-center text-gray-400 text-sm">
                        <i class="bi bi-qr-code text-3xl mb-2 block"></i>
                        Preparing QR...
                    </div>
                    }

                </div>

            </div>

            <!-- Actions -->
            @if (qrCode()) {
            <div class="mt-6 flex gap-3">
                <button (click)="download()"
                    class="px-5 py-2 bg-primary text-white rounded-full text-sm font-medium hover:bg-primary-400 transition">
                    <i class="bi bi-download mr-1"></i> Download
                </button>
            </div>
            }

        </div>

        <!-- Footer -->
        <div class="bg-gray-50 px-6 py-3 text-center text-xs text-gray-500 border-t border-gray-200">
            Clean, scannable, and hopefully not abused.
        </div>

    </div>
</div>
