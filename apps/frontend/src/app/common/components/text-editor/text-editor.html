<form [formGroup]="form">
  @if (false) {
    <div class="editor">
      <ngx-editor [editor]="editor" formControlName="editorContent">
        <ngx-editor-floating-menu [editor]="editor">
          <ngx-editor-menu [editor]="editor"></ngx-editor-menu>
        </ngx-editor-floating-menu>
      </ngx-editor>
    </div>
  }
  <div class="w-full" [ngClass]="addBorder() ? 'NgxEditor__Wrapper':''">
    <ngx-editor-menu [editor]="editor" [toolbar]="toolbar"> </ngx-editor-menu>
    <ngx-editor [editor]="editor" formControlName="editorContent" [spellcheck]="true" class="h-60"> </ngx-editor>
  </div>
</form>
