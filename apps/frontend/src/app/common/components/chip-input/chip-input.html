<div class="w-full max-w-md flex gap-2 flex-col">
  <!-- Input with Add Button -->
  <div class="relative flex items-center">
    <input [formControl]="inputControl" (keydown.enter)="addChip()" type="text" placeholder="Type and press Enter..."
      class="form-control !accent-primary pr-10" />
    <button type="button" (click)="addChip()" tabindex="-1" aria-label="Add"
      class="absolute right-2 top-1/2 -translate-y-1/2 text-primary-600 hover:text-primary-800 text-lg px-1 py-1 rounded-full focus:outline-none">
      <!-- Simple plus icon (SVG for cross-platform consistency) -->
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 18 18">
        <line x1="9" y1="4" x2="9" y2="14" stroke-linecap="round" />
        <line x1="4" y1="9" x2="14" y2="9" stroke-linecap="round" />
      </svg>
    </button>
  </div>
  <span class="text-xs text-gray-500 italic">Type and Press Enter</span>
  <!-- Chips -->
  <div class="flex gap-1">
    <div class="flex flex-wrap gap-2">
      @for (chip of chips(); track chip; let i = $index) {
      <span class="flex items-center bg-gray-200 shadow text-gray-600 px-2 rounded-full text-xs">
        {{ chip }}
        <button type="button" (click)="removeChip(i)"
          class="text-gray-600 hover:text-red-500 focus:outline-none ml-1 px-0">
          ✕
        </button>
      </span>
      }
    </div>
  </div>
</div>
