<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900 bg-opacity-50">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-sm mx-4">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 bg-white rounded-t-xl pt-6">
      <div class="flex items-center gap-2">
        <i class="bi" [ngClass]="headerIcon" class="text-2xl text-primary"></i>
        <p class="text-lg font-semibold text-primary">{{ title }}</p>
      </div>
      <button class="text-red-500 hover:text-red-600 transition-colors" (click)="onCancel()">
        <i class="bi bi-x-lg text-lg"></i>
      </button>
    </div>


    <!-- Content -->
    <div class="px-6 pt-2  pb-5">
      <p class="text-gray-500 text-[12px] leading-relaxed">{{ description }}</p>
    </div>
    <!-- Content -->
    <div class="px-6 pb-5">
      <p class="text-gray-500 text-[12px] leading-relaxed">{{ message }}</p>
    </div>
    <!-- Footer Actions -->
    <div class="flex justify-end items-center space-x-2.5 px-6 pt-10 pb-6">
      <app-button [icon]="cancelButtonIcon" [label]="cancelButtonText" styles="btn-reset"
        (buttonClicked)="onCancel()" />
      <app-button [icon]="confirmButtonIcon" [label]="confirmButtonText" (buttonClicked)="onConfirm()" />
    </div>
  </div>
</div>
