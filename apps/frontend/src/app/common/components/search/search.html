<button type="button" (click)="toggleSearch()"
[ngClass]="fullSearchInput() ? 'hidden':''">
  <i class="bi bi-search text-2xl focus:ring-primary-500 sm:hidden"></i>
</button>
@if (showInput) {
  <form class="absolute md:relative md:left-0 flex items-center" [formGroup]="searchForm"
    [ngClass]="fullSearchInput() ? 'relative':''" (ngSubmit)="search()">
    <input type="text" placeholder="Search for..." #searchInput formControlName="keyword"
      class="bg-gray-50 rounded-md md:rounded-full py-2 px-4 pl-10 pr-4 w-full lg:w-[500px] focus:outline-none focus:ring-1 focus:ring-primary-50">
    <i class="bi bi-search absolute left-3 text-gray-400"></i>
    @if (showSearchButton) {
      <button type="submit"
        class="absolute right-[1px] bg-primary-600 hover:bg-primary-500 py-2 px-2 md:px-5  rounded-tr-md rounded-br-md md:rounded-tr-full md:rounded-br-full text-white">
        <i class="bi bi-search text-white"></i>
        <!-- Search -->
      </button>
    }
  </form>
}
