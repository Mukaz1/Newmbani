<button for=""
  class="flex items-center gap-3 cursor-pointer select-none"
  [class.opacity-50]="disabled"
  [attr.aria-checked]="value"
  role="switch"
  tabindex="0"
  [ngClass]="customClass"
  (click)="toggle()"
  >
  <!-- Track -->
  <div
    class="relative transition-colors duration-300 ease-in-out"
    [ngClass]="[colorClass, shapeClass, sizeClass]"
    >
    <!-- Knob -->
    <div
      class="absolute top-0.5 left-0.5 bg-white shadow-md transform transition-transform duration-300 ease-in-out flex items-center justify-center overflow-hidden"
      [ngClass]="[knobSizeClass, shapeClass, knobTranslate]"
      >
      @if (ripple) {
        <span
          class="absolute w-full h-full bg-red-500 opacity-40 rounded-full animate-ripple"
        ></span>
      }
    </div>
  </div>

  <!-- Label text -->
  <span class="text-sm font-medium text-gray-700">
    @if (value && onTemplate) {
      <ng-container *ngTemplateOutlet="onTemplate"></ng-container>
    } @else {
      {{ currentLabel }}
    }


    @if (!value && offTemplate) {
      <ng-container *ngTemplateOutlet="offTemplate"></ng-container>
    }
  </span>
</button>
