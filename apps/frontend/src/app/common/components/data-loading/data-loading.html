@if (fullPage()) {
  <div class="w-full h-full flex flex-col loader-class justify-center items-center">
    <div class="row center">
      <div class="loader"></div>
      <p [ngClass]="styles()" class="font-thin">{{ message }}</p>
    </div>
  </div>
}

@if (!fullPage()) {
  <div class="center row" [ngClass]="containerStyles()">
    <div class="loader"></div>
    <p [ngClass]="styles()"  class="font-thin">{{ message }}</p>
  </div>
}
