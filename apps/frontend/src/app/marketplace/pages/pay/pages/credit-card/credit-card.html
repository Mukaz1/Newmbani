<div class="flex items-center mb-4">
    <span class="text-gray-500 mr-2">Amount to Pay:</span>
    <span class="text-lg font-semibold text-primary-700">${{ totalAmount
        }}</span>
</div>
<!-- Saved Cards -->
@if (savedCards.length > 0) {
<div class="mb-4">
    <h3 class="text-base font-semibold mb-2">Saved Cards</h3>
    <div class="flex flex-col gap-2">
        @for (card of savedCards; track card) {
        <label class="flex items-center p-3 border rounded-md cursor-pointer hover:bg-gray-50 transition">
            <input type="radio" name="savedCard" [value]="card.id" [(ngModel)]="selectedCardId"
                class="form-radio text-primary-600 mr-3" />
            <div class="flex items-center gap-3">
                <span class="text-xl" [class]="'brand-' + card.brand">{{ getCardBrandIcon(card.brand) }}</span>
                <span class="tracking-widest text-gray-700">{{ maskCardNumber(card.last4) }}</span>
                <span class="text-xs text-gray-500">{{ card.expiryMonth }}/{{ card.expiryYear }}</span>
            </div>
        </label>
        }
    </div>
</div>
}
@if (savedCards.length > 0) {
<div class="flex items-center justify-center my-4">
    <span class="px-3 py-1 bg-gray-100 rounded-full text-xs text-gray-500 font-medium">OR</span>
</div>
}
<!-- New Card Form -->
<div>
    <h3 class="text-base font-semibold mb-2">Add New Card</h3>
    <form [formGroup]="cardForm" (ngSubmit)="onCardPaymentSubmit()" class="space-y-3">
        <div>
            <input type="text" placeholder="Card number" formControlName="cardNumber"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary-300"
                maxlength="19" (input)="formatCardNumber($event)" />
        </div>
        <div>
            <input type="text" placeholder="Name on card" formControlName="cardholderName"
                class="w-full px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary-300" />
        </div>
        <div class="flex gap-3">
            <input type="text" placeholder="MM/YY" formControlName="expiryDate"
                class="w-1/2 px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary-300"
                maxlength="5" (input)="formatExpiryDate($event)" />
            <input type="text" placeholder="CVV" formControlName="cvv"
                class="w-1/2 px-3 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary-300"
                maxlength="4" />
        </div>
        <button type="submit"
            class="w-full py-2 mt-2 bg-primary-600 text-white rounded-md font-semibold hover:bg-primary-700 transition disabled:opacity-60 disabled:cursor-not-allowed"
            [disabled]="cardForm.invalid || isProcessing">
            @if (!isProcessing) {
            <span>Pay ${{ totalAmount
                }}</span>
            }
            @if (isProcessing) {
            <span>Processing...</span>
            }
        </button>
    </form>
</div>
