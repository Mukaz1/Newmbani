<div class="p-8 lg:p-10">
  <div class="mb-8">
    <div
      class="w-24 h-24 mx-auto bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center ">
      <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
      </svg>
    </div>
  </div>

  <div class="space-y-4 py-2 flex gap-2 justify-center items-center flex-col">
    <h2 class="text-xl md:text-2xl font-bold text-gray-900">Check Your Phone</h2>
    <p class="text-xs md:text-sm font-semibold text-gray-600 ">STK Push sent to +254 {{ phone }}</p>
  </div>

  <div class="bg-green-50 border-2 border-green-200 rounded-2xl p-6 mb-8">
    <div class="flex items-start gap-4">
      <div class="flex-shrink-0">
        <svg class="w-6 h-6 text-green-600" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
            clip-rule="evenodd" />
        </svg>
      </div>
      <div class="text-left flex-1">
        <p class="text-base font-bold text-green-900 mb-3">Complete Payment:</p>
        <ol class="space-y-2 text-sm text-green-800">
          <li class="flex items-start gap-2">
            <span class="font-bold">1.</span>
            <span>Check for the M-Pesa payment prompt on your phone</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="font-bold">2.</span>
            <span>Enter your M-Pesa PIN to authorize the payment</span>
          </li>
          <li class="flex items-start gap-2">
            <span class="font-bold">3.</span>
            <span>You'll receive a confirmation SMS from M-Pesa</span>
          </li>
        </ol>
      </div>
    </div>
  </div>

  <div class="flex items-center justify-center gap-3 text-gray-600 mb-8">
    <app-data-loading message="Waiting for payment confirmation" [fullPage]="false" containerStyles="!text-green-500"
      styles="!text-green-500 !font-semibold" />
  </div>
  <div class="flex justify-center">
    <button (click)="cancelled.emit()" class="btn-reset ">
      Cancel and go back
    </button>
  </div>

</div>
