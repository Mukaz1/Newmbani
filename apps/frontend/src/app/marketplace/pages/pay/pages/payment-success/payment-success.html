<div class="p-8 lg:p-10 max-w-xl mx-auto border rounded-2xl mt-5">
  <div class="mb-8 animate-scale-in">
    <div
      class="w-20 h-20 mx-auto bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center shadow-lg">
      <span class="bi bi-check text-5xl text-white"></span>
    </div>
  </div>

  <div class="flex flex-col gap-2 py-2">
    <h2 class="text-3xl font-bold text-gray-900 mb-3">Payment Successful!</h2>
    <p class="text-sm text-gray-600 mb-8">
      Your payment of <span class="font-bold text-gray-900"> Ksh {{ invoice?.totalAmount ?? 0
        }}</span> has
      been confirmed
    </p>
  </div>

  <div class="bg-green-50 border-2 border-green-200 rounded-2xl p-6 mb-6">
    <div class="space-y-3 text-left">

      <div class="flex justify-between items-center py-2 border-b border-green-200">
        <span class="text-sm text-gray-600">Amount Paid</span>
        <span class="font-bold text-gray-900">Ksh {{ invoice?.totalAmount ?? 0 }}</span>
      </div>
      <div class="flex justify-between items-center py-2 border-b border-green-200">
        <span class="text-sm text-gray-600">Payment Method</span>
        <span class="font-bold text-gray-900">M-Pesa</span>
      </div>
      <div class="flex justify-between items-center py-2">
        <span class="text-sm text-gray-600">Status</span>
        <span class="inline-flex items-center gap-1 font-bold text-green-600">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
              clip-rule="evenodd" />
          </svg>
          Completed
        </span>
      </div>
    </div>
  </div>

  <div class="bg-primary-50 border-2 border-primary-200 rounded-2xl p-5 mb-8">
    <div class="flex items-start gap-3">
      <svg class="w-5 h-5 text-primary-600 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
        <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
        <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
      </svg>
      <div class="text-left flex-1">
        <p class="text-sm font-semibold text-primary-900 mb-1">Receipt Sent!</p>
        <p class="text-sm text-primary-700">
          Confirmation email sent to
          <span class="font-semibold">email</span> with payment receipt.
        </p>
      </div>
    </div>
  </div>

  <div class="space-y-4">
    <!-- <button (click)="viewBooking(invoice!.bookingId!)"
      class="w-full bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-bold text-lg py-2 rounded-xl">
      View Booking
    </button> -->

  </div>
</div>
