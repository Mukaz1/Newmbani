<!-- eslint-disable @angular-eslint/template/click-events-have-key-events -->
<!-- eslint-disable @angular-eslint/template/interactive-supports-focus -->

<div class="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">

    <!-- ── Price ──────────────────────────────────────────────────────── -->
    <div class="px-6 pt-6 pb-4 border-b border-gray-100">
        <p class="text-xs font-medium text-gray-400 uppercase tracking-wider mb-1">Price</p>
        <p class="text-3xl font-extrabold text-gray-700">
            Ksh {{ currentProperty()?.rentPrice }}
        </p>

        @if (currentProperty()?.deposit) {
        <p class="text-xs text-gray-400 mt-1">
            Ksh + {{ currentProperty()?.deposit }} refundable deposit
        </p>
        }
    </div>

    <!-- ── Agent Detail ───────────────────────────────────────────────── -->
    <div class="px-6 py-5 border-b border-gray-100">
        <p class="text-sm font-semibold text-gray-900 mb-4">Landlord Detail</p>

        <div class="flex items-center gap-4 mb-4">
            <!-- Avatar -->
            @if (currentProperty()?.landlord?.profileImage) {
            <img [src]="currentProperty()!.landlord.profileImage" alt="Agent profile"
                class="w-14 h-14 rounded-full object-cover ring-2 ring-gray-100 flex-shrink-0" />
            } @else {
            <div
                class="w-14 h-14 rounded-full bg-gradient-to-br from-gray-100 to-gray-200 flex items-center justify-center flex-shrink-0">
                <i class="bi bi-person text-2xl text-gray-400"></i>
            </div>
            }

            <!-- Name & role -->
            <div class="min-w-0">
                <p class="font-bold text-gray-900 truncate">
                    {{ currentProperty()?.landlord?.displayName || 'N/A' }}
                </p>
                <p class="text-xs text-gray-500">Property Owner</p>
            </div>
        </div>


    </div>

    <!-- ── Inspection Times ───────────────────────────────────────────── -->
    <div class="px-6 py-5">

        <button type="button" (click)="makeAppointment()"
            class="w-full flex items-center justify-center gap-2 py-3 bg-gray-500 text-white text-sm font-semibold rounded-xl hover:bg-primary/90 active:scale-[.98] transition-all duration-200 shadow-sm shadow-primary/30">
            <i class="bi bi-calendar3 text-base"></i>
            Make Appointment
        </button>
    </div>

</div>
