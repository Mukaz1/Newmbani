<div class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-50 p-4 animate-fadeIn">
    <div
        class="relative bg-white  w-full rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col max-w-xl mx-auto mt-5 border relative">
        <button type="button" class="focus:outline-none absolute top-3 right-3" aria-label="Close" (click)="close()"
            (keyup.enter)="close()" (keyup.space)="close()" tabindex="0">
            <i class="bi bi-x text-2xl text-gray-400"></i>
        </button>
        <div class="flex-1 md:px-8 px-4 py-6 space-y-6 overflow-y-auto">
            <div class="mb-8 animate-scale-in">
                <div
                    class="w-20 h-20 mx-auto bg-gradient-to-br from-green-400 to-green-600 rounded-full flex items-center justify-center shadow-lg">
                    <span class="bi bi-check text-5xl text-white"></span>
                </div>
            </div>
            <div class="flex flex-col gap-2 py-2 items-center justify-center text-center">
                <h2 class="text-2xl md:text-3xl font-bold tracking-tight mb-3 text-gray-900">Booking Success!</h2>
                <p class="modal-section-text mb-8">

                    Your booking for viewing
                    <span class="font-semibold text-gray-900">{{ booking()?.property?.title }}</span>
                    has been <span class="text-green-700 font-semibold">sheduled</span>.<br>
                    <span>
                        <span class="text-gray-600">Viewing dates</span>
                        <span class="font-medium text-gray-900">
                            {{
                            booking()?.viewingDate | date:'EEE, d MMM y'
                            }}
                        </span>
                    </span>
                    <br>
                    <span class="block mt-3">We look forward to receiving you!</span>
                </p>
            </div>

            <div class="bg-green-50 border-2 border-green-200 rounded-2xl p-6 mb-6">
                <div class="space-y-3 text-left">
                    <div class="flex items-center gap-3 py-2 border-b border-green-200">
                        <span class="text-sm text-green-700 flex items-center gap-2">
                            <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                                    clip-rule="evenodd" />
                            </svg>
                            Booking Saved
                        </span>
                    </div>

                </div>
            </div>
        </div>

        <div
            class="space-y-4 bg-gray-50  px-8 py-4 text-center  text-xs text-gray-500  border-t border-gray-200 sticky bottom-0 z-10">
            <button (click)="viewBooking()"
                class="w-full bg-gradient-to-r from-primary-600 to-primary-700 hover:from-primary-700 hover:to-primary-800 text-white font-bold text-lg py-2 rounded-xl">
                View Booking
            </button>
        </div>
    </div>
</div>
