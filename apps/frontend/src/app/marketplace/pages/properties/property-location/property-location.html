<div
  class="relative w-full rounded-2xl overflow-hidden border border-gray-200 shadow-sm dark:border-gray-700 bg-white dark:bg-gray-800"
>

  <!-- Skeleton loader before map loads -->
  <div
    *ngIf="!mapLoaded"
    class="h-[260px] w-full animate-pulse bg-gray-200 dark:bg-gray-700"
  ></div>

  <!-- Map -->
  <google-map
    class="w-full"
    height="260px"
    width="100%"
    [center]="position"
    [zoom]="zoom"
    [options]="mapOptions"
    (mapInitialized)="onMapInitialized()"
  >
    <!-- <map-marker
      [position]="position"
      [title]="propertyName"
      (mapClick)="marker.toggle()"
      #marker="mapMarker"
    ></map-marker> -->

    <!-- Info window / popup -->
    <map-info-window #infoWindow>
      <div class="font-semibold text-gray-800 dark:text-gray-50">
        {{ propertyName }}
      </div>
      <div class="text-xs text-gray-600 dark:text-gray-300">
        📍 Lat: {{ latitude }} | Lng: {{ longitude }}
      </div>
    </map-info-window>
  </google-map>

  <div
    class="px-3 py-2 text-xs bg-gray-50 dark:bg-gray-700 border-t border-gray-200 dark:border-gray-600 text-gray-600 dark:text-gray-300 flex justify-between items-center"
  >
    <span>📌 Lat: {{ latitude }} | Lng: {{ longitude }}</span>

    <button
      class="text-blue-600 dark:text-blue-400 hover:underline"
       (click)="openFullMap()"
    >
      Full Map →
    </button>
  </div>
</div>
