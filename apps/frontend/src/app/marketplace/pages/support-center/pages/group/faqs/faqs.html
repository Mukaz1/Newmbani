<div class="w-full container mx-auto">
  <div class="mb-8">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Frequently Asked Questions</h2>
    <p class="text-gray-600">Find quick answers about staying with Newmbani BnBs</p>
  </div>

  <div class="space-y-3">
    @for (faq of faqs; track faq) {
    <div class="border border-gray-200 rounded-lg overflow-hidden bg-white shadow-sm">
      <button (click)="toggleFaq(faq.id)"
        class="w-full px-6 py-4 flex items-center justify-between text-left hover:bg-gray-50 transition-colors">
        <span class="font-medium text-gray-900 pr-4">{{ faq.question }}</span>
        <svg [class.rotate-180]="isFaqOpen(faq.id)" class="w-5 h-5 text-gray-500 flex-shrink-0 transition-transform"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M19 14l-7 7m0 0l-7-7m7 7V3" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" />
        </svg>
      </button>

      <div [class.max-h-96]="isFaqOpen(faq.id)" [class.max-h-0]="!isFaqOpen(faq.id)"
        class="overflow-hidden transition-all duration-300">
        <div class="px-6 py-4 bg-gray-50 text-gray-700 border-t border-gray-200">
          {{ faq.answer }}
        </div>
      </div>
    </div>
    }
  </div>

  <div class="mt-8 p-6 bg-green-50 rounded-lg border border-green-100">
    <h3 class="font-semibold text-gray-900 mb-2">Still have questions?</h3>
    <p class="text-gray-600 text-sm mb-4">
      Reach out to our guest support team — we’re here to help make your stay exceptional.
    </p>

    <div class="flex flex-wrap gap-3">
      <a href="mailto:{{ settings?.general?.email }}"
        class="inline-flex items-center px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors text-sm font-medium">
        Email Support
      </a>

      <a href="tel:+254701663066"
        class="inline-flex items-center px-4 py-2 bg-white text-green-600 border border-green-600 rounded-lg hover:bg-green-50 transition-colors text-sm font-medium">
        Call Us
      </a>
    </div>
  </div>
</div>
