<section class="relative w-full overflow-hidden">
  <!-- Background Image -->
  <div class="absolute inset-0 bg-cover bg-center" style="
      background-image: url('https://images.unsplash.com/photo-1528459801416-a9e53bbf4e17?w=800&auto=format&fit=crop');
    "></div>

  <!-- Overlay (left white fade for text visibility) -->
  <div class="absolute inset-0 bg-gradient-to-r from-white to-transparent"></div>

  <!-- Content -->
  <div
    class="relative z-10 container w-full mx-auto px-6 md:pl-20 pt-8 mt-6 h-full flex items-center justify-between gap-3">
    <!-- Left Text -->
    <div class="max-w-md">
      <p class="text-sm text-primary-600 uppercase font-medium mb-6">
        ● Our Happy Customers
      </p>
      <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 leading-tight mb-10">
        What Our Users Say<br />
        Real Profit, Real Results
      </h2>

      <!-- Testimonial Card -->
      <div class="bg-white rounded-xl p-6 shadow-md border border-gray-200 max-w-md">
        <p class="text-gray-700 text-base leading-relaxed mb-4">
          "{{ testimonials[currentIndex].quote }}"
        </p>
        <div class="flex items-center gap-3">
          <img [src]="testimonials[currentIndex].image" alt="{{ testimonials[currentIndex].name }}"
            class="w-10 h-10 rounded-2xl object-cover" />
          <div>
            <p class="font-semibold text-gray-900 text-sm">
              {{ testimonials[currentIndex].name }}
            </p>
            <p class="text-xs text-gray-500">
              {{ testimonials[currentIndex].title }}
            </p>
          </div>
        </div>
      </div>

      <!-- Arrows -->
      <div class="flex gap-4 mt-6 items-center z-10 justify-center mb-20">
        <!-- Previous -->
        <button (click)="prevTestimonial()"
          class="w-12 h-12 rounded-full p-0 border border-gray-300 shadow flex items-center justify-center hover:bg-gray-100 transition">
          <svg class="text-gray-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 32 32" width="32"
            height="32">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 27l-9-11 9-11" />
          </svg>
        </button>
        <!-- Next -->
        <button (click)="nextTestimonial()"
          class="w-12 h-12 rounded-full p-0 border border-gray-300 shadow flex items-center justify-center hover:bg-gray-100 transition">
          <svg class="text-gray-600" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 32 32" width="32"
            height="32">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 5l9 11-9 11" />
          </svg>
        </button>
      </div>
    </div>
    <!-- Right Image -->
    <div class="flex-1 max-w-md">
      <div class="rounded-2xl overflow-hidden shadow-lg">
        <img
          src="https://images.unsplash.com/photo-1718717621302-a359be21a111?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NDB8fEFpcmJuYmR8ZW58MHx8MHx8fDA%3D"
          alt="Testimonial Visual" class="w-full h-full object-cover" />
      </div>
    </div>
  </div>
</section>
