<!-- eslint-disable @angular-eslint/template/interactive-supports-focus -->
<!-- eslint-disable @angular-eslint/template/click-events-have-key-events -->
<form
  class="bg-white h-screen sticky top-0 shadow-lg w-full md:w-80 overflow-hidden flex flex-col rounded-2xl space-y-4 p-4 md:p-6 z-50"
  [formGroup]="filtersForm">
  <!-- Header with Close button at top right -->
  <div class="flex items-center justify-between mb-4 relative">
    <h2 class="text-lg font-semibold text-gray-900">Filter by</h2>
    <button type="button" (click)="closeFilters()"
      class="absolute right-0 top-0 text-xl text-gray-700 hover:text-red-600 p-2 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed"
      aria-label="Close">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <!-- Location -->
  <div class="flex flex-col z-10">
    <label for="location" class="text-sm text-gray-700 mb-1 font-medium">Location</label>
    <input id="location" formControlName="location" class="form-control" placeholder="e.g. Nairobi, Mombasa..." />
  </div>



  <div class="flex flex-col z-10">
    <label for="categoryId" class="text-sm text-gray-700 mb-1 font-medium">Property category</label>
    <select id="categoryId" formControlName="categoryId" class="form-select">
      <option value="">Any</option>
      @for (category of propertyCategoryOptions; track category._id) {
      <option [value]="category._id">{{ category.name }}</option>
      }
    </select>
  </div>

  <!-- Price Range -->
  <div class="grid grid-cols-2 gap-4">
    <div class="flex flex-col">
      <label for="minPrice" class="text-sm text-gray-700 mb-1 font-medium">Min Price</label>
      <input id="minPrice" type="number" formControlName="minPrice" class="form-control" placeholder="Min price" />
    </div>
    <div class="flex flex-col">
      <label for="maxPrice" class="text-sm text-gray-700 mb-1 font-medium">Max Price</label>
      <input id="maxPrice" type="number" formControlName="maxPrice" class="form-control" placeholder="Max price" />
    </div>
  </div>





  <!-- Apply and Clear Buttons Row -->
  <div class="flex flex-row gap-3 justify-between mt-4">
    <app-button (buttonClicked)="resetFilters()" label="Clear all"
      styles="flex-1 !bg-transparent !border !border-red-600 !text-red-600 hover:!bg-red-50" />
    <app-button (buttonClicked)="updateFilters()" label="Apply Filters" styles="flex-1" />
  </div>
</form>
