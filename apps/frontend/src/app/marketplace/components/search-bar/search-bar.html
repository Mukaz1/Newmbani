<!-- eslint-disable @angular-eslint/template/interactive-supports-focus -->
<!-- eslint-disable @angular-eslint/template/click-events-have-key-events -->
<form [formGroup]="searchForm" (ngSubmit)="submitSearch()"
  class="relative bg-white backdrop-blur-sm rounded-xl p-4 shadow-lg mx-5 md:container md:mx-auto md:w-full border border-gray-100 z-11">


  <!-- Title -->
  <div class="text-center mb-4 mt-4">
    <h2 class="text-xl font-bold text-gray-800">
      Find Your Next Home
    </h2>
  </div>



  <!--  SALE Layout -->
  <div class="grid grid-cols-6 gap-3 items-end">

    <!-- Location -->
    <div class="col-span-6 md:col-span-1">
      <label for="" class="text-xs font-medium !text-primary mb-1">Location</label>
      <input type="text" formControlName="location" placeholder="Where to?" class="form-control" />
    </div>
    <!-- Bedrooms -->
    <div class="col-span-3 md:col-span-1">
      <label for="" class="text-xs font-medium !text-primary mb-1">Bedrooms</label>
      <select formControlName="bedrooms" class="form-control">
        <option value="">Any</option>
        @for (n of [1,2,3,4]; track $index) {
        <option [value]="n">{{ n }} {{ n > 1 ? 'bedrooms' : 'bedroom' }}</option>
        }
        <option value="5+">5+ bedrooms</option>
      </select>
    </div>

    <!-- Bathrooms -->
    <div class="col-span-3 md:col-span-1">
      <label for="" class="text-xs font-medium !text-primary mb-1">Bathrooms</label>
      <select formControlName="bathrooms" class="form-control">
        <option value="">Any</option>
        @for (n of [1,2,3,4]; track $index) {
        <option [value]="n">{{ n }} {{ n > 1 ? 'bathrooms' : 'bathroom' }}</option>
        }
        <option value="5+">5+ bathrooms</option>
      </select>
    </div>

    <!-- Min Price -->
    <div class="col-span-3 md:col-span-1">
      <label for="" class="text-xs font-medium !text-primary mb-1">Min Price</label>
      <input type="number" formControlName="minPrice" placeholder="Min" class="form-control" />
    </div>

    <!-- Max Price -->
    <div class="col-span-3 md:col-span-1">
      <label for="" class="text-xs font-medium !text-primary mb-1">Max Price</label>
      <input type="number" formControlName="maxPrice" placeholder="Max" class="form-control" />
    </div>

    <!-- Search -->
    <div class="col-span-6 md:col-span-1 flex">

      <button type="submit" class="w-full bg-primary-600 hover:bg-primary-700 text-white px-6 py-3 rounded-lg transition
               text-sm font-medium flex items-center justify-center">
        <i class="bi bi-search text-sm mr-2"></i>
        <span>Search</span>
      </button>
    </div>
  </div>
</form>
