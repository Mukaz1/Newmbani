<form [formGroup]="searchForm" (ngSubmit)="submitSearch()"
  class="relative bg-white backdrop-blur-sm rounded-xl p-4 shadow-lg mx-5 md:container md:mx-auto md:w-full border border-gray-100 z-11">
  <div class="text-center mb-4 mt-4">
    <h2 class="text-xl font-bold text-gray-800">Find Your Next Home</h2>
  </div>

  <div class="grid grid-cols-6 gap-3 items-end">

    <!-- Location -->
    <div class="col-span-6 md:col-span-1">
      <label class="text-xs font-medium !text-primary mb-1 block">Location</label>
      <input type="text" formControlName="location" placeholder="County, town or street"
        class="bg-gray-50/80 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary" />
    </div>

    <!-- Category -->
    <div class="col-span-6 md:col-span-1">
      <label class="text-xs font-medium !text-primary mb-1 block">Category</label>
      <select formControlName="categoryId"
        class="bg-gray-50/80 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary">
        <option value="">All Categories</option>
        @for (category of categories; track category._id) {
        <option [value]="category._id">{{ category.name }}</option>
        }
      </select>
    </div>

    <!-- Subcategory -->
    <div class="col-span-6 md:col-span-1">
      <label class="text-xs font-medium !text-primary mb-1 block">Subcategory</label>
      <select formControlName="subcategoryId"
        class="bg-gray-50/80 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary disabled:opacity-50 disabled:cursor-not-allowed">
        <option value="">All Sub Categories</option>
        @for (sub of filteredSubcategories; track sub._id) {
        <option [value]="sub._id">{{ sub.name }}</option>
        }
      </select>
    </div>

    <!-- Min Price -->
    <div class="col-span-3 md:col-span-1">
      <label class="text-xs font-medium !text-primary mb-1 block">Min Price</label>
      <input type="number" formControlName="minPrice" placeholder="Min" min="0"
        class="bg-gray-50/80 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary" />
    </div>

    <!-- Max Price -->
    <div class="col-span-3 md:col-span-1">
      <label class="text-xs font-medium !text-primary mb-1 block">Max Price</label>
      <input type="number" formControlName="maxPrice" placeholder="Max" min="0"
        class="bg-gray-50/80 border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary" />
    </div>

    <!-- Submit -->
    <div class="col-span-6 md:col-span-1 flex">
      <button type="submit"
        class="w-full bg-primary-600 hover:bg-primary-700 text-white px-6 py-3 rounded-lg transition text-sm font-medium flex items-center justify-center">
        <i class="bi bi-search text-sm mr-2"></i>
        <span>Search</span>
      </button>
    </div>

  </div>
</form>
