<!-- === Backdrop === -->
<div class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-50 p-4 animate-fadeIn"></div>

<!-- === Modal Container === -->
<div class="fixed inset-0 z-50 flex items-center justify-center overflow-y-auto">
  <div
    class="relative bg-white  w-full rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col sm:max-w-lg sm:my-8 ">

    <!-- === Header === -->
    <header
      class="bg-linear-to-r from-primary to-secondary-700 text-white px-4 md:px-8 py-6  sticky top-0 z-10 relative">
      <h3 class="text-2xl md:text-3xl font-bold tracking-tight">Upload Company Logo</h3>
      <p class="text-sm md:text-base opacity-80 mt-1">
        Choose a logo to upload. The file should be in PNG, JPG, or JPEG format and less than 5MB.
      </p>

      <!-- Close Button -->
      <button type="button"
        class="absolute top-5 right-6 w-8 h-8 flex items-center justify-center  rounded-full hover:bg-white/20 transition-colors"
        (click)="closeModal()" title="Close">
        <i class="bi bi-x-lg text-white text-lg"></i>
      </button>
    </header>

    <!-- === Body === -->
    <div class="flex-1 md:px-8 px-4 py-6 space-y-6 overflow-y-auto h-max">

      <!-- File Upload Area -->
      <div
        class="flex justify-center rounded-2xl border border-dashed border-gray-300 px-6 py-10 bg-gray-50  hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors cursor-pointer"
        (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
        <div class="text-center">
          <i class="bi bi-cloud-upload text-5xl text-gray-400 dark:text-gray-500"></i>

          <div class="mt-4 flex text-sm leading-6 text-gray-600  justify-center items-center">
            <label [for]="'file-upload-' + uniqueId"
              class="relative cursor-pointer rounded-md font-semibold text-primary focus-within:outline-none focus-within:ring-2 focus-within:ring-primary-600 focus-within:ring-offset-2 hover:text-primary-500">
              <span>Upload a file</span>
              <input [id]="'file-upload-' + uniqueId" name="file-upload" type="file" class="sr-only"
                accept="image/png,image/jpeg,image/jpg" (change)="onFileSelected($event)" />
            </label>
            <p class="pl-1">or drag and drop</p>
          </div>

          <p class="text-xs leading-5 text-gray-500  mt-1">
            PNG, JPG, JPEG up to 5MB
          </p>
        </div>
      </div>

      <!-- File Preview -->
      @if (selectedFile()) {
      <div class="mt-6">
        <div class="flex items-center justify-between p-3 bg-gray-100  rounded-lg shadow-sm">
          <div class="space-y-3">
            <img [src]="blobUrl()" alt="" class="w-3/4">
            <p>{{selectedFile()?.name}}</p>
          </div>
          <button type="button" class="text-gray-400 hover:text-red-500 transition-colors" (click)="removeFile()"
            title="Remove file">
            <i class="bi bi-trash text-red-500 text-2xl"></i>
          </button>
        </div>
      </div>
      }
    </div>

    <!-- === Footer === -->
    <footer
      class="bg-gray-50  px-8 py-4 text-center  text-xs text-gray-500  border-t border-gray-200 sticky bottom-0 z-10 flex justify-end gap-3">
      <button type="button"
        class="py-2 px-4 rounded-full bg-gray-200 hover:bg-gray-400 items-center text-center text-gray-700 font-semibold  isabled:opacity-50 disabled:cursor-not-allowedhover:font-bold transition-colors duration-300 ease-in-out"
        (click)="closeModal()">
        Cancel
      </button>

      <button type="button"
        class="py-2 px-4 rounded-full bg-primary hover:bg-primary-400 items-center text-center text-white font-semibold hover:font-bold disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-300 ease-in-out"
        [disabled]="!selectedFile() || isUploading()" (click)="uploadFile()">
        @if (isUploading()) {
        <i class="bi bi-arrow-repeat animate-spin"></i>
        }
        {{ isUploading() ? 'Uploading...' : 'Upload' }}
      </button>
    </footer>
  </div>
</div>
