<div class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-50 p-4 animate-fadeIn">
    <div class="relative bg-white w-full rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col max-w-lg"
        style="min-width: 24rem;">
        <!-- Header -->
        <div
            class="bg-linear-to-r from-primary to-secondary-700 text-white px-4 md:px-8 py-6 sticky top-0 z-10 flex justify-between items-center border-b border-gray-200 p-4">
            <h2 class="text-2xl md:text-3xl font-bold tracking-tight text-white">
                Cancel Booking
            </h2>
            <button
                class="absolute top-5 right-6 w-8 h-8 flex items-center justify-center rounded-full hover:bg-white/20 transition-colors"
                (click)="close()" aria-label="Close modal">
                <i class="bi bi-x-lg text-gray-800 dark:text-white text-lg"></i>
            </button>
        </div>

        <!-- Body -->
        <div class="flex-1 md:px-8 px-4 py-6 space-y-6 overflow-y-auto p-6">
            <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
                <div>
                    <p class="text-sm text-gray-500">
                        Provide an optional reason for cancelling this booking.
                    </p>
                </div>
                <div>
                    <label for="cancel-reason" class="block text-sm font-medium text-gray-500">
                        Reason (optional)
                    </label>
                    <textarea id="cancel-reason" formControlName="reason" rows="4"
                        class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-primary-500 focus:border-primary-500"
                        placeholder="Reason for cancellation"></textarea>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div
            class="bg-gray-50 px-8 py-4 text-center text-xs text-gray-500 border-t border-gray-200 sticky bottom-0 z-10 flex justify-end gap-3 p-4">
            <app-button (buttonClicked)="close()" [label]="'Cancel'" [disabled]="submitting()"
                styles="!bg-gray-200 !hover:bg-gray-400 !text-gray-700"></app-button>
            <app-button [label]="'Confirm Cancel'" (click)="submit()" [disabled]="submitting() || form.invalid"
                [isLoading]="submitting()" styles="!bg-red-50 !hover:bg-red-100 !text-red-700"></app-button>
        </div>
    </div>
</div>
