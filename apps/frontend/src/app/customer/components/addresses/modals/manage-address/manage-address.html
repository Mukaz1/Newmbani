<div class="modal-backdrop">
  <div class="modal-container w-full md:w-2/3 lg:w-1/2">

    <!-- Header -->
    <div class="modal-header flex justify-between items-center">
      <h1 class="modal-title">Manage Address</h1>
      <button class="modal-close" (click)="closeModal()">
        <i class="bi bi-x-lg text-white text-lg"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <form [formGroup]="addressForm" class="space-y-6">

        <!-- Country -->
        <div>
          <label for="countryId" class="block mb-2 text-sm font-medium required">Country</label>
          <app-searchable-select formControlName="countryId" [options]="countryOptions()" placeholder="Enter country" />
        </div>

        <!-- Divider -->
        <hr class="border-gray-200 dark:border-gray-700" />

        <!-- Grid Inputs -->
        <div class="grid gap-6 md:grid-cols-2">

          <div class="col-span-2">
            <label for="name" class="block mb-2 text-sm font-medium required">Full Name</label>
            <input id="name" type="text" class="form-control" placeholder="Enter your full name" formControlName="name"
              required />
          </div>

          <div>
            <label for="email" class="block mb-2 text-sm font-medium required">Email Address</label>
            <input id="email" type="email" class="form-control" placeholder="Enter your email address"
              formControlName="email" required />
          </div>

          <div>
            <label for="phone" class="block mb-2 text-sm font-medium required">Phone Number</label>
            <div class="flex items-center">
              <button type="button"
                class="flex-shrink-0 inline-flex items-center py-2.5 px-4 text-sm font-medium text-center text-gray-900 bg-gray-100 border border-gray-300 rounded-s-lg hover:bg-gray-200 focus:ring-4 focus:outline-none focus:ring-gray-100 dark:bg-gray-700 dark:hover:bg-gray-600 dark:text-white dark:border-gray-600">
                {{ code }}
              </button>
              <input id="phone" type="text"
                class="block p-2.5 w-full text-sm bg-gray-50 rounded-e-lg border border-gray-300 focus:ring-primary-500 focus:border-primary-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                placeholder="Enter your phone number" formControlName="phone" required />
            </div>
          </div>

          <div class="col-span-2">
            <label for="street" class="block mb-2 text-sm font-medium required">Street Name & House Number</label>
            <input id="street" type="text" class="form-control" placeholder="Enter your street name and house number"
              formControlName="street" required />
          </div>

          <div>
            <label for="boxAddress" class="block mb-2 text-sm font-medium required">Box Address</label>
            <input id="boxAddress" type="text" class="form-control" placeholder="Enter your box address"
              formControlName="boxAddress" required />
          </div>

          <div>
            <label for="postalCode" class="block mb-2 text-sm font-medium required">Postal Code</label>
            <input id="postalCode" type="text" class="form-control" placeholder="Enter your postal code"
              formControlName="postalCode" required />
          </div>

          <div>
            <label for="town" class="block mb-2 text-sm font-medium required">Town</label>
            <input id="town" type="text" class="form-control" placeholder="Enter your town name" formControlName="town"
              required />
          </div>

          <div>
            <label for="city" class="block mb-2 text-sm font-medium required">City</label>
            <input id="city" type="text" class="form-control" placeholder="Enter your city name" formControlName="city"
              required />
          </div>

          <div class="flex items-center mt-2 col-span-2">
            <input id="isDefault" type="checkbox"
              class="form-checkbox h-4 w-4 text-primary-600 transition duration-150 ease-in-out"
              formControlName="isDefault" />
            <label for="isDefault" class="ml-2 block text-sm font-medium text-gray-900">
              Set as default address
            </label>
          </div>
        </div>

        <!-- Submit -->
        <div class="flex justify-end pt-4">
          <app-button (buttonClicked)="submit()" [isLoading]="isLoading" label="Submit" />
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer">
      &copy; {{ currentYear }} Aluxe
    </div>
  </div>
</div>
