<div class="h-full w-full flex flex-col">
    <!-- Close button (mobile only) -->
    <div class="flex justify-end mt-2 p-2 md:hidden">
        <button (click)="closeSidebar()" class="p-2 rounded hover:bg-gray-100 transition" aria-label="Close sidebar">
            <i class="bi bi-x-lg text-xl text-gray-600"></i>
        </button>
    </div>

    <!-- Navigation -->
    <nav class="p-4 flex-1">
        <div class="mb-6">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">
                GENERAL
            </p>
            <ul class="space-y-1">
                <li>
                    <a href="#" routerLink="/customer/dashboard" routerLinkActive="link-active"
                        [routerLinkActiveOptions]="{exact: true}"
                        class="flex items-center space-x-3 px-3 py-2 text-gray-900">
                        <i class="bi bi-speedometer2 w-5 h-5"></i>
                        <span class="font-medium">Overview</span>
                    </a>
                </li>

                <li>
                    <a href="#" routerLink="/customer/bookings" routerLinkActive="link-active"
                        class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <i class="bi bi-calendar-check w-5 h-5"></i>
                        <span>Bookings</span>
                    </a>
                </li>

            </ul>
        </div>
        <div class="mb-6 hidden">
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">
                Finance
            </p>
            <ul class="space-y-1">

                <li>
                    <a href="#" routerLink="/customer/payments" routerLinkActive="link-active"
                        class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <i class="bi bi-credit-card w-5 h-5"></i>
                        <span>Payments</span>
                    </a>
                </li>
            </ul>
        </div>

        <div>
            <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">
                ACCOUNT
            </p>
            <ul class="space-y-1">
                <li>
                    <a href="#" routerLink="/customer/settings" routerLinkActive="link-active"
                        class="flex items-center space-x-3 px-3 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg">
                        <i class="bi bi-gear-fill w-5 h-5"></i>
                        <span>Settings</span>
                    </a>
                </li>
                <li>
                    <a href="#" routerLink="/properties"
                        class="flex items-center space-x-3 px-3 py-2 text-primary-900 font-bold">
                        <i class="bi bi-reply-fill w-5 h-5"></i>
                        <span class="font-medium">Go to Listings</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>
</div>
