@if(loading()){
<app-data-loading [fullPage]="false" />
}
<div>
    <h3 class="text-lg font-semibold text-gray-900 mb-2">Password Settings</h3>
    <p class="text-sm text-gray-600 mb-8">Please fill full details about yourself</p>

    <form [formGroup]="passwordForm" (ngSubmit)="updatePassword()" class="max-w-2xl space-y-6">
        <div>
            <label for="" for="" for="" class="block text-sm font-medium text-gray-900 mb-2">Current
                Password</label>
            <div class="relative">
                <input [type]="showCurrentPassword ? 'text' : 'password'" formControlName="currentPassword"
                    placeholder="Enter Current Password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
                <button type="button" (click)="showCurrentPassword = !showCurrentPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <div>
            <label for="" for="" for="" class="block text-sm font-medium text-gray-900 mb-2">New
                Password</label>
            <div class="relative">
                <input [type]="showNewPassword ? 'text' : 'password'" formControlName="newPassword"
                    placeholder="Enter New Password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
                <button type="button" (click)="showNewPassword = !showNewPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <div>
            <label for="" for="" for="" class="block text-sm font-medium text-gray-900 mb-2">Confirm
                Password</label>
            <div class="relative">
                <input [type]="showConfirmPassword ? 'text' : 'password'" formControlName="confirmPassword"
                    placeholder="Enter Confirm Password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2.5 pr-10 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent" />
                <button type="button" (click)="showConfirmPassword = !showConfirmPassword"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
        </div>

        <div class="border-t border-gray-200 pt-6">
            <p class="text-sm font-medium text-gray-900 mb-3">Password Requirements:</p>
            <ul class="space-y-2 text-sm text-gray-600">
                <li class="flex items-start gap-2">
                    <span class="text-gray-400 mt-0.5">•</span>
                    <span>At least one lowercase character</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-gray-400 mt-0.5">•</span>
                    <span>Minimum 8 characters long - the more, the better</span>
                </li>
                <li class="flex items-start gap-2">
                    <span class="text-gray-400 mt-0.5">•</span>
                    <span>At least one number, symbol, or whitespace character</span>
                </li>
            </ul>
        </div>

        <div class="flex justify-end gap-3 pt-4">
            <button type="button"
                class="py-2 px-4 rounded-full bg-gray-200 hover:bg-gray-400 items-center text-center text-gray-700 font-semibold  isabled:opacity-50 disabled:cursor-not-allowedhover:font-bold transition-colors duration-300 ease-in-out">
                Cancel
            </button>
            <button type="submit"
                class="py-2 px-4 rounded-full bg-primary hover:bg-primary-400 items-center text-center text-white font-semibold hover:font-bold disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-300 ease-in-out"
                [disabled]="passwordForm.invalid">
                Update Password
            </button>
        </div>
    </form>
</div>
