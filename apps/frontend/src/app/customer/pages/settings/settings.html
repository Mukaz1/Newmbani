<div class="bg-white min-h-screen">
  <div class="container mx-auto">
    <!-- Welcome Banner -->
    <div class="relative">
      <div
        class="bg-gradient-to-r h-48 from-primary to-secondary rounded-2xl p-6 mb-8 overflow-hidden flex flex-col gap-3 items-start justify-center text-start relative">

        <!-- Text Section -->
        <div class="max-w-[60%] ">
          <h2 class="text-2xl font-bold text-white mb-3">
            Personalize Your Experience
          </h2>
          <p class="text-white text-regular opacity-90">
            Fine-tune your account settings to reflect your goals, your pace, and your style.
          </p>
        </div>

        <!-- Image Decoration -->
        <!-- <img src="/assets/images/decorations/settings.png" alt="Settings"
          class="absolute top-0 right-0 w-40 md:w-56 h-48 object-contain z-20 opacity-90 md:right-8" /> -->
      </div>
    </div>

    <!-- Tabs -->
    <div class="mt-6">
      <div class="flex gap-2 text-sm">
        <a [routerLink]="['/customer/settings/profile']" routerLinkActive="!bg-primary !text-white border-primary"
          [routerLinkActiveOptions]="{ exact: true }" class="px-4 py-2 rounded-full border transition-all duration-200
            bg-white text-gray-600  border-gray-300
            hover:text-gray-900 hover:border-gray-400"> Profile
        </a>
        <a [routerLink]="['/customer/settings/password']" routerLinkActive="!bg-primary !text-white border-primary"
          [routerLinkActiveOptions]="{ exact: true }" class="px-4 py-2 rounded-full border transition-all duration-200
            bg-white text-gray-600  border-gray-300
            hover:text-gray-900 hover:border-gray-400"> Password
        </a>

      </div>
    </div>

    <div class="bg-gray-100 rounded-2xl p-6 mt-6">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
