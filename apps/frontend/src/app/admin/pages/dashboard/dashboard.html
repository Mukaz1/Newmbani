<div class="relative overflow-hidden bg-white mx-auto">
  <div class="flex gap-5 flex-wrap md:flex-nowrap">
    <div class="flex-none w-[100%] md:w-[70%]">
      <div>
        <app-welcome-card />
        <div class="my-5">
          <app-top-stats [totalLandlords]="totalClients()" [totalBookings]="totalBookings()"
            [totalProperties]="totalProperties()" [highestProperty]="highestProperty()" />
        </div>
      </div>
      <div class="mt-5">
        <app-top-landlords (totalLandlords)="setTotalClients($event)" />
      </div>
      <div class="mt-5">
      </div>
    </div>
    <div class="flex-initial w-[100%] md:w-[30%] flex flex-col">
      <div class="">
        <app-top-categories />
      </div>
      <div class="mt-5">
        <app-top-selling-properties />
      </div>
    </div>
  </div>
</div>
