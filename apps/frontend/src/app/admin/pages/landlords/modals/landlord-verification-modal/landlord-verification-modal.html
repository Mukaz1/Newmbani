<div class="modal-backdrop items-end justify-end">
  <div class="modal-container md:w-2/3 lg:w-1/2 w-full min-w-96 h-full rounded-t-2xl">
    <!-- Header -->
    <div class="modal-header flex justify-between items-center">
      <h2 class="modal-title">Landlord Details</h2>
      <button class="modal-close" (click)="closeModal()" aria-label="Close modal">
        <i class="bi bi-x-lg text-white text-lg"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="modal-body">
      <form [formGroup]="landlordVerificationForm" (submit)="onSubmit()" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div>
            <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
              Landlord Name
            </label>
            <input id="name" formControlName="name" type="text" class="form-input form-control mt-1"
              placeholder="Enter landlord name" required />
          </div>

          <div>
            <label for="verificationStatus" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
              Verification Status
            </label>
            <select id="verificationStatus" formControlName="verificationStatus" class="form-control mt-1" required>
              <option value="pending">Pending</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>

        <div>
          <label for="comments" class="block text-sm font-medium text-gray-700 dark:text-gray-300">
            Comments
          </label>
          <textarea id="comments" formControlName="comments" rows="4"
            class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-primary-500 focus:border-primary-500"
            placeholder="Enter any comments or notes"></textarea>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="modal-footer flex justify-end gap-3">
      <app-button (buttonClicked)="closeModal()" [label]="'Cancel'"
        styles="!bg-gray-200 !hover:bg-gray-400 !text-gray-700 "></app-button>

      <app-button [label]="'Verify Landlord'" (click)="verifyLandlord()"
        [disabled]="isLoading() || landlordVerificationForm.invalid" [isLoading]="isLoading()"
        [ngClass]="{ 'opacity-50 cursor-not-allowed': isLoading() }"></app-button>
    </div>
  </div>
</div>
