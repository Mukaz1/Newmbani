<div
  class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-50 p-4 animate-fadeIn h-screen justify-end">
  <div
    class="relative bg-white  w-full rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col min-w-96 w-full md:w-2/3 lg:w-1/2 h-full">
    <div
      class="bg-linear-to-r from-primary to-secondary-700 text-white px-4 md:px-8 py-6  sticky top-0 z-10 flex flex-row justify-between">
      <p class="text-2xl md:text-3xl font-bold tracking-tight">Document Details</p>
      <div class="w-max flex gap-4">
        <app-button [showIcon]="true" label="Edit" icon="bi bi-pen font-bold" (buttonClicked)="edit(document)" />
        <app-button [showIcon]="true" label="Close" icon="bi bi-x font-bold" (buttonClicked)="closeModal()" />
      </div>
    </div>
    <div class="flex-1 md:px-8 px-4 py-6 space-y-6 overflow-y-auto">
      <div class=" flex flex-col gap-3">

        <div class="grid grid-cols-2 gap-5">
          <div>
            <p class="font-semibold">Document Name</p>
            <p class="text-sm">{{document.name}}</p>
          </div>

          <div>
            <p class="font-semibold">Mandatory</p>
            <span [ngClass]="{'bg-green-200':document.isMandatory,'bg-orange-200':!document.isMandatory}"
              class="text-sm px-3 py-0.5  rounded-full">{{document.isMandatory ? 'Mandatory':'Not Mandatory'}}</span>
          </div>
          <div>
            <p class="font-semibold">Country</p>
            <p class="text-sm"> {{document.country.name}}</p>
          </div>
          <div>
            <p class="font-semibold">Type</p>
            <p class="text-sm">{{document.isServiceProvider ? 'Service Provider':'Host'}}</p>
          </div>
          <div>
            <p class="font-semibold">Created At</p>
            <p class="text-sm">{{document.createdAt|date:'medium'}}</p>
          </div>


        </div>

      </div>

    </div>
    <div
      class="bg-gray-50  px-8 py-4 text-center  text-xs text-gray-500  border-t border-gray-200 sticky bottom-0 z-10">
      <p>&copy; {{currentYear}} Newmbani</p>
    </div>
  </div>
</div>
