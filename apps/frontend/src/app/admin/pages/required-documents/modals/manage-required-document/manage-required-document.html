<div
  class="fixed inset-0 flex justify-center items-center bg-black/60 backdrop-blur-sm z-50 p-4 animate-fadeIn h-screen justify-end">
  <div
    class="relative bg-white  w-full rounded-2xl shadow-2xl overflow-hidden transform transition-all duration-300 scale-100 flex flex-col min-w-96 w-full md:w-2/3 lg:w-1/2 h-full">
    <div
      class="bg-linear-to-r from-primary to-secondary-700 text-white px-4 md:px-8 py-6  sticky top-0 z-10 flex flex-row justify-between">
      <p class="text-2xl md:text-3xl font-bold tracking-tight">{{requiredDocument ? 'Edit':'Add'}} Document</p>
      <div class="w-max flex gap-4">
        <app-button [showIcon]="true" label="" icon="bi bi-x font-bold" (buttonClicked)="closeModal()" />
      </div>
    </div>
    <div class="flex-1 md:px-8 px-4 py-6 space-y-6 overflow-y-auto flex flex-col justify-between">
      <form (ngSubmit)="submit()" [formGroup]="documentForm" class="grid grid-cols-2 gap-5">
        <!-- Document Name -->
        <div>
          <label for="" class="font-semibold block mb-1">Document Name</label>
          <input type="text" formControlName="name" placeholder="Enter Document Name"
            class="form-input bg-gray-50/80  border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary placeholder:text-gray-400" />
        </div>

        <!-- Country -->
        <div>
          <label for="country" class="font-semibold block mb-1">Country</label>
          <app-searchable-select formControlName="countryId" [options]="countryOptions()" placeholder="Enter country" />

        </div>

        <div>
          <label class="font-semibold block mb-1">
            <input type="checkbox" formControlName="isMandatory" class="mr-2 accent-blue-500" />
            Document Mandatory?
          </label>
        </div>
        <div>
          <label class="font-semibold block mb-1">
            <input type="checkbox" formControlName="isPropertyHost" class="mr-2 accent-blue-500" />
            Needed for Hosts?
          </label>
        </div>
        <div>
          <label class="font-semibold block mb-1">
            <input type="checkbox" formControlName="isServiceProvider" class="mr-2 accent-blue-500" />
            Needed for Service Providers?
          </label>
        </div>

        <div class="py-5">
          <app-button [isLoading]="isLoading()" label="Submit" type="submit" [disabled]="documentForm.invalid" />
        </div>
      </form>
    </div>
  </div>
</div>
