<div class="card p-5">
  <div class="mb-5">
    <div class="flex justify-between mb-2">
      <p class="text-xl font-semibold text-gray-800 ">Add New Role</p>
      <button
        class=" py-2 px-4 rounded-full bg-primary hover:bg-primary-400 items-center text-center text-white font-semibold hover:font-bold disabled:opacity-50 disabled:cursor-not-allowed transition-colors duration-300 ease-in-out"
        routerLink="/admin/settings/roles">Back</button>
    </div>
    If you need more info, please check out
    <a href="#" class="link-primary font-bold">Help Page</a>.
  </div>
</div>
<div>
  <form [formGroup]="registerRoleForm" (ngSubmit)="createRole()">
    <div class="grid grid-cols-1">
      <div>
        <div>
          <label for="role" class="required">Role Name</label>
          <input type="text" name="role"
            class="bg-gray-50/80  border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary"
            placeholder="Role Name" formControlName="role" />
          @if ( registerRoleForm.get('role')?.invalid &&
          (registerRoleForm.get('role')?.dirty ||
          registerRoleForm.get('role')?.touched) ) {
          <div class="input-error">
            @if (registerRoleForm.get('role')?.errors?.['required']) {
            <span> Role Name is required. </span>
            }
          </div>
          }
        </div>
      </div>
      <div class="lg:col-span-2 mt-5">
        <label for="description">Description</label>
        <textarea name="description" id="description" cols="30" rows="10" formControlName="description"
          placeholder="Description"
          class="bg-gray-50/80  border border-gray-300 text-gray-900 text-sm rounded-lg block w-full px-2.5 py-3 focus:outline-1 focus:ring-2 focus:ring-primary focus:border-primary"></textarea>
      </div>
    </div>

    <div class="pt-5 flex flex-row gap-5">
      <button type="reset" class="btn bg-gray-500 text-white me-3 rounded-full px-5">
        Discard
      </button>

      <div>
        <app-button [label]="'Submit'" [isLoading]="isLoading" type="submit" [styles]="
              'w-full !rounded-full inline-flex items-center justify-center shadow-sm whitespace-nowrap text-base font-medium text-white'
            " />
      </div>
    </div>
  </form>
</div>
