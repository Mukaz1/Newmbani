<div class="mx-auto">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
    <!-- Selling Property -->
    <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center">
            <i class="bi bi-calendar-x text-purple-600"></i>
          </div>
          <span class="text-sm font-medium text-gray-600">Bookings</span>
        </div>
      </div>
      <div class="space-y-1">
        <div class="text-3xl font-bold text-gray-900">{{totalBookings}}</div>
        <div class="flex items-center space-x-1">

        </div>
      </div>
    </div>

    <!-- Top Properties -->
    <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center">
            <i class="bi bi-houses text-blue-600"></i>
          </div>
          <span class="text-sm font-medium text-gray-600">Properties</span>
        </div>
      </div>
      <div class="space-y-1">
        <div class="text-3xl font-bold text-gray-900">{{totalProperties}}</div>
        <div class="flex items-center space-x-1">

        </div>
      </div>
    </div>

    <!-- Reorder Property -->
    <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center">
            <i class="bi bi-person-plus text-yellow-600"></i>
          </div>
          <span class="text-sm font-medium text-gray-600">Total Property Owners</span>
        </div>
      </div>
      <div class="space-y-1">
        <div class="text-3xl font-bold text-gray-900">{{totalLandlords}}</div>

      </div>
    </div>

    <!-- Highest Property -->
    <div class="bg-white rounded-lg p-6 shadow-sm border border-gray-100">
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center space-x-3">
          <div class="w-10 h-10 bg-teal-100 rounded-full flex items-center justify-center">
            <svg class="w-5 h-5 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2z">
              </path>
            </svg>
          </div>
          <span class="text-sm font-medium text-gray-600">Highest Property</span>
        </div>
      </div>
      <div class="space-y-1">
        <div class="text-3xl font-bold text-gray-900">Ksh.{{highestProperty}}</div>

      </div>
    </div>
  </div>
</div>
