<div class="overflow-x-auto card shadow-sm p-5 mt-5">
  <div class="my-2">
    <p class="text-xl">Latest Clients</p>
    <p class="text-sm text-gray-500">Below are the latest clients</p>
  </div>
  <table class="min-w-full divide-y divide-gray-200 bg-white rounded-lg shadow">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          #
        </th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Customer
        </th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Phone
        </th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Email
        </th>
        <th class="px-4 py-2 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
          Actions
        </th>
        <!-- Add more columns as defined in the Customer interface -->
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-200">
      @for (customer of customers; track $index;) {

      <tr class="hover:bg-gray-100">
        <td class="px-4 py-2 whitespace-nowrap">{{ $index + 1 }}</td>
        <td class="px-4 py-2 whitespace-nowrap">{{ customer.name }}</td>
        <td class="px-4 py-2 whitespace-nowrap">{{ customer.phone }}</td>
        <td class="px-4 py-2 whitespace-nowrap">{{ customer.email }}</td>
        <td class="px-4 py-2 whitespace-nowrap">
          <a class="text-primary-600 hover:underline rounded-full" title="View" href="#"
            routerLink="/admin/customers/{{ customer._id }}">
            <svg xmlns="http://www.w3.org/2000/svg" class="inline h-8 w-8" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
            View
          </a>
        </td>
      </tr>
      }

      @if (customers.length === 0) {
      <tr>
        <td colspan="5" class="px-4 py-4 text-center text-gray-500">
          No customers found.
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
