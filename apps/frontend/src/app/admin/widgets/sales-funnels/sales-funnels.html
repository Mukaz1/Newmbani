<div class="bg-white rounded-md p-5 shadow-md">
  <div class="flex justify-between items-center">
    <p class="text-xl text-black font-bold">Sales Funnels</p>
    <button>
      <i class="bi bi-three-dots"></i>
    </button>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-[40px] md:mt-5">
    @for (stage of salesStages; track stage) {
      <div class="mb-4">
        <p class="font-bold mb-1">{{ stage.name }}</p>
        <div class="flex items-center">
          <span class="text-2xl font-bold mr-2">{{ stage.value }}</span>
          <span class="text-primary-500 flex items-center">
            <i class="bi bi-arrow-up-short"></i>
            8.32%
          </span>
        </div>
        <p class="text-sm text-gray-500">{{ stage.subtext }}</p>
        <div class="mt-2 bg-primary-200 h-2 rounded-full" [style.width]="stage.percentage"></div>
      </div>
    }
  </div>
</div>
