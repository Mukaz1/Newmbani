<!-- Sales Summary Card -->
<div
  class="bg-gradient-to-r from-primary-800 from-40% to-primary-400 p-5 rounded-2xl py-[40px] text-white overflow-hidden shadow-md">
  <div class="flex flex-col md:flex-row justify-between items-start relative">
    <div class="flex flex-col gap-2 md:gap-5">
      <p class="font-bold text-3xl text-white mb-3 w-[300px] md:w-[60%]">Here's what's happening in your marketplace
        in last weeks 👋
      </p>
      <p class="font-bold text-xl text-white">$8,567.00 <span class="text-sm font-light">Sales Profits</span></p>
      <p class="text-[#7bab4f] font-medium text-md mt-[6px]"> 2,478 properties sold
        <span class="text-white font-light">
          and it's increasing from the last weeks
        </span>
      </p>
      <app-button label="View Report" [showIcon]="true" icon="bi bi-arrow-right" styles="bg-white !text-black" />
    </div>
    <div class="hidden md:block absolute right-0 top-0 h-full ">
      <img src="../../../../assets/icons/working.png" alt="" class="w-full" style="top: -20px;">
    </div>
  </div>
