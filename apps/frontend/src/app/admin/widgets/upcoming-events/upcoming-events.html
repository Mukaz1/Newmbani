@if (false) {
<div class="bg-white rounded-md p-5">
  <div class="flex justify-between items-center">
    <p class="text-xl text-black font-bold">Next Upcoming Events</p>
    <button>
      <i class="bi bi-three-dots"></i>
    </button>
  </div>
</div>
}
<div class="bg-white rounded-lg shadow-md p-4 max-w-md mx-auto">
  <div class="flex justify-between items-center mb-4">
    <p class="text-xl text-black font-bold">Next Upcoming Events</p>
    <button>
      <i class="bi bi-three-dots"></i>
    </button>
  </div>

  <div class="bg-primary-50 rounded-lg p-4 mb-4">
    <div class="relative h-48 mb-4">
      <img src="/apps/frontend/src/assets/icons/event.png" alt="Events Image"
        class="absolute rounded-sm object-contain h-full w-full">
    </div>
  </div>

  <div class="space-y-4">
    <div class="flex items-center space-x-3">
      <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
        <i class="fa-solid fa-bag-shopping text-blue-500"></i>
      </div>
      <div>
        <p class="font-semibold text-gray-800">Lazada 12.12 event special sales</p>
        <p class="text-sm text-gray-600">12 -14 December 2024 | 20:00</p>
      </div>
    </div>

    <div class="flex items-center space-x-3">
      <div class="w-12 h-12 bg-primary-100 rounded-full flex items-center justify-center">
        <i class="fa-solid fa-truck-fast text-primary-500"></i>
      </div>
      <div>
        <p class="font-semibold text-gray-800">Free shipping worldwide</p>
        <p class="text-sm text-gray-600">12 -14 December 2024 | 20:00</p>
      </div>
    </div>

    <button
      class="btn border border-gray-500 text-black w-full flex gap-3 justify-center items-center mt-5 hover:text-white hover:bg-primary-500 hover:border-primary-500">
      View event calendar <i class="bi bi-arrow-up-right-square"></i>
    </button>
  </div>
</div>
