<div class="bg-white rounded-md p-5 shadow-md">
  <div class="flex justify-between items-center">
    <p class="text-xl text-black font-bold">Top Selling Properties</p>
  </div>

  <div class="space-y-4">
    @for (property of properties(); track property._id) {
    <div class="flex items-center justify-between bg-white p-3 transition-all">
      <!-- Left section: image + info -->
      <div class="flex items-center gap-3 min-w-0">
        <img [src]="property?.images?.[0]?.link" alt="{{ property.title }}"
          class="w-16 h-16 rounded-xl object-cover flex-shrink-0" />
        <div class="min-w-0">
          <h3 class="font-semibold text-gray-800 text-sm truncate max-w-[10rem]" title="{{ property.title }}">
            {{ property.title }}
          </h3>

          <p class="text-gray-500 text-xs">
            {{ property.rentPrice }}
          </p>
        </div>
      </div>

      <!-- Right section: booking count -->
      <div class="flex-shrink-0 text-right">
        <span class="bg-blue-100 text-blue-700 text-xs font-medium px-3 py-1 rounded-full">
          {{ property.bookings.length || 0 }}
          {{ property.bookings.length === 1 ? 'booking' : 'bookings' }}
        </span>
      </div>
    </div>
    }
  </div>
</div>
