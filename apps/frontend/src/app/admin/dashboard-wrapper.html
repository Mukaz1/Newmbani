<div class="h-screen overflow-hidden bg-white flex relative">
  <!-- Sidebar (desktop & mobile) -->
  @if (isSidebarOpen) {
  <div class="fixed inset-0 z-40 bg-black bg-opacity-40 transition-opacity md:hidden" tabindex="0"
    (click)="closeSidebar()" (keydown.enter)="closeSidebar()" (keydown.space)="closeSidebar()" role="button"
    aria-label="Close sidebar overlay"></div>
  }
  <aside
    class="fixed z-50 top-0 left-0 h-screen w-64 bg-white shadow-sm border-r border-gray-200 flex flex-col overflow-y-auto transition-transform duration-300 md:static md:translate-x-0 md:flex md:flex-col"
    [ngClass]="{ '-translate-x-full': !isSidebarOpen, 'translate-x-0': isSidebarOpen, 'md:translate-x-0': true }">
    <app-admin-sidebar />
  </aside>

  <!-- Main Content -->
  <div class="flex-1 h-screen overflow-y-auto">
    <!-- Header -->
    <header class="sticky bg-white top-0 z-30 px-4 py-3 flex flex-row items-center justify-between md:px-6 md:py-4">
      <div class="flex items-center">
        <!-- Hamburger for mobile -->
        <button class="md:hidden mr-4 p-2 rounded hover:bg-gray-100" (click)="toggleSidebar()">
          <i class="bi bi-list text-2xl"></i>
        </button>
        <div>
          <p class="text-gray-600">{{greeting}},</p>
          <h1 class="text-2xl font-bold text-gray-900">{{user?.name}}</h1>
        </div>
      </div>
      <div class="flex items-center space-x-4">

        <app-user-profile-widget theme="light" [forBackend]="true" />

      </div>

    </header>

    <!-- Dashboard Content -->
    <main class="p-2 md:py-4 md:px-6 min-h-screen relative">
      <div class="pb-16"> <!-- Adjust padding-bottom to match footer height -->
        <router-outlet />
      </div>
      <div class="absolute bottom-0 left-0 right-0">
        <app-footer />
      </div>
    </main>
  </div>
</div>
